services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_image_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_image_db
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret}
      JWT_EXPIRES_IN: 7d
      BASE_URL: http://localhost:5000
      CLIENT_URL: http://localhost:8080
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-pollinations}
      STABILITY_API_KEY: ${STABILITY_API_KEY:-}
      HF_API_KEY: ${HF_API_KEY:-}
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  pgdata:
  uploads:
